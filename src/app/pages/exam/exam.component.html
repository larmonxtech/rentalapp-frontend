<div class="contenedor-examenes">
    <h1 class="titulo">Exámenes</h1>
    <ul class="lista-examenes">
        @for (exam of exams; track $index) {
            <li class="elemento">
                <span class="id">#{{exam.idExam}}</span>
                <span class="nombre">{{ exam.name }}</span>
            </li>
        }
    </ul>
</div>
