<mat-dialog-content>
    <mat-toolbar>
        <span>Exam Info</span>
    </mat-toolbar>

    <div class="example-container">
        <mat-form-field>
            <input matInput placeholder="Name" [(ngModel)]="$exam().name">
        </mat-form-field>

        <mat-form-field>
            <input matInput placeholder="Description" [(ngModel)]="$exam().description">
        </mat-form-field>
        
        <button mat-flat-button (click)="operate()">
            <span>OK</span>
            <mat-icon>done</mat-icon>
        </button>

        <button mat-flat-button class="cancel-button" (click)="close()">
            <span>Cancel</span>
            <mat-icon>cancel</mat-icon>
        </button>
    </div>

</mat-dialog-content>
